{s:"Bruno",side:"other",pt:`Que bom que você <b>veio</b>! Amanhã <b>vai ser</b> o melhor dia da sua viagem, pode apostar.${T('past','vir·past')} ${T('fut','ir+inf')} ${T('comp','superlative')}`,en:"How good that you came! Tomorrow will be the best day of your trip, you can bet on it."},
],
vocab:[{pt:"aconchegante",en:"cosy / warm / welcoming"},{pt:"animado/a",en:"lively / fun / exciting"},{pt:"a cachoeira",en:"the waterfall"},{pt:"descobrir",en:"to discover"},{pt:"a cena",en:"the scene (cultural/social)"},{pt:"pode apostar",en:"you can bet on it"}],
chunks:[{pt:"Faço o possível.",en:"I do my best."},{pt:"Nasci e cresci aqui.",en:"Born and raised here."},{pt:"Você poderia me acompanhar?",en:"Could you come with me? (polite conditional)"},{pt:"Seria um prazer.",en:"It would be a pleasure."},{pt:"Que bom que você veio!",en:"How good that you came!"}],
notes:['Que bom que + verb — exclamative structure: que bom que você veio, que pena que foi embora.','Conditional for politeness: você poderia (could you) is softer than você pode (can you).','Vivo viajando = I live travelling — gerund after viver expresses a continuous lifestyle habit.']},
];

const verbs=[

verbs.forEach(v=>{verbTenseState[v.name]=Object.keys(v.tenses)[0];});

function getAllCards(){
  let cards=[];
  scenes.forEach(s=>{
    (s.vocab||[]).forEach(v=>cards.push({pt:v.pt,en:v.en,scene:s.tab}));
    (s.chunks||[]).forEach(c=>cards.push({pt:c.pt,en:c.en,scene:s.tab+'·chunk'}));
  });
  return cards;
}
function getSceneCards(si){
  if(si===-1) return getAllCards();
  const s=scenes[si];
  let cards=[];
  (s.vocab||[]).forEach(v=>cards.push({pt:v.pt,en:v.en,scene:s.tab}));
  (s.chunks||[]).forEach(c=>cards.push({pt:c.pt,en:c.en,scene:s.tab+'·chunk'}));
  return cards;
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=
    scenes.map((s,i)=>`<button class="tab ${curView==='dialogue'&&curScene===i?'active':''}" onclick="goScene(${i})">${s.tab}</button>`).join('')+
    `<button class="tab special ${curView==='flash'?'active':''}" onclick="goFlash()">🃏 Flashcards</button>`+
    `<button class="tab special ${curView==='verbs'?'active':''}" onclick="goVerbs()">📚 Verbos</button>`;
}

function renderDialogue(){
  const s=scenes[curScene];
  const legendHtml=`<div class="legend" id="legend">
    <span class="gtag pres">pres</span><span style="font-size:.65rem;color:#777"> present &nbsp;</span>
    <span class="gtag past">past</span><span style="font-size:.65rem;color:#777"> perfect &nbsp;</span>
    <span class="gtag imp">imp</span><span style="font-size:.65rem;color:#777"> imperfect &nbsp;</span>
    <span class="gtag fut">fut</span><span style="font-size:.65rem;color:#777"> future &nbsp;</span>
    <span class="gtag cond">cond</span><span style="font-size:.65rem;color:#777"> conditional &nbsp;</span>
    <span class="gtag comp">comp</span><span style="font-size:.65rem;color:#777"> comp/superl. &nbsp;</span>
    <span class="gtag subj">subj</span><span style="font-size:.65rem;color:#777"> subjunctive</span>
  </div>`;

  let msgs='';
  s.messages.forEach((m,idx)=>{
    const tmp=document.createElement('div');tmp.innerHTML=m.pt;tmp.querySelectorAll('.gtag').forEach(el=>el.remove());
    const cleanPt=tmp.textContent.replace(/\s+/g,' ').trim();
    const audioBtn=`<button class="audio-btn ${apiKey?'':'no-key'}" id="abtn-${idx}" data-text="${cleanPt.replace(/"/g,'&quot;')}" onclick="playText(this.dataset.text,this)" title="${apiKey?'Play audio':'Paste API key to enable audio'}">🔊</button>`;
    if(quizMode){
      msgs+=`<div class="msg-row ${m.side}">
        <div class="speaker">${m.s}</div>
        <div class="quiz-cover" id="cover-${idx}" onclick="revealMsg(${idx})">Tap to reveal ${m.side==='you'?'your':'their'} line →</div>
        <div class="bubble-wrap" id="wrap-${idx}" style="display:none">
          ${m.side==='you'?audioBtn:''}
          <div class="bubble" id="bub-${idx}">
            <span class="pt">${m.pt}</span>
            <span class="en${showEng?'':' hidden'}">${m.en}</span>
          </div>
          ${m.side==='other'?audioBtn:''}
        </div>
      </div>`;
    } else {
      msgs+=`<div class="msg-row ${m.side}">
        <div class="speaker">${m.s}</div>
        <div class="bubble-wrap">
          ${m.side==='you'?audioBtn:''}
          <div class="bubble">
            <span class="pt">${m.pt}</span>
            <span class="en${showEng?'':' hidden'}">${m.en}</span>
          </div>
          ${m.side==='other'?audioBtn:''}
        </div>
      </div>`;
    }
  });

  const vocab=(s.vocab||[]).map(v=>`<div class="vocab-item"><div class="vocab-pt">${v.pt}</div><div class="vocab-en">${v.en}</div></div>`).join('');
  const chunks=(s.chunks||[]).map(c=>`<div class="chunk"><strong>${c.pt}</strong><br>${c.en}</div>`).join('');
  const notes=(s.notes||[]).map(n=>`<div class="note">${n}</div>`).join('');

  document.getElementById('main').innerHTML=`
    <div class="scene-header"><span class="scene-icon">${s.icon}</span><h2>${s.title}</h2></div>
    <div class="scene-desc">${s.desc}</div>
    ${legendHtml}
    <div class="chat">${msgs}</div>
    <div class="panels">
      <div class="panel">
        <div class="panel-title">Vocabulário</div>${vocab}
        <div style="margin-top:14px"><div class="panel-title">Chunks · Frases-chave</div>${chunks}</div>
      </div>
      <div class="panel"><div class="panel-title">Notas Culturais & Gramática</div>${notes}</div>
    </div>`;

  if(!showTags) document.getElementById('main').classList.add('tags-hidden');
  const lg=document.getElementById('legend');
  if(lg&&!showTags) lg.classList.add('hidden');
  document.getElementById('controls').style.display='flex';
}

function revealMsg(idx){
  document.getElementById('cover-'+idx).style.display='none';
  document.getElementById('wrap-'+idx).style.display='flex';
}

function renderFlash(){
  document.getElementById('controls').style.display='none';
  let cards=getSceneCards(fcScene);
  if(!cards.length){document.getElementById('main').innerHTML='<p style="text-align:center;color:#888;margin-top:40px">No cards for this scene.</p>';return;}
  fcIdx=Math.min(fcIdx,cards.length-1);
  const c=cards[fcIdx];
  const opts=`<option value="-1" ${fcScene===-1?'selected':''}>All scenes</option>`+scenes.map((s,i)=>`<option value="${i}" ${fcScene===i?'selected':''}>${s.tab}</option>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="fc-wrap">
      <div class="fc-scene-select">Scene: <select onchange="fcChangeScene(this.value)">${opts}</select></div>
      <div class="fc-flip-hint">Tap the card to flip</div>
      <div class="fc-card" id="fcCard" onclick="fcFlip()">
        <div class="fc-inner">
          <div class="fc-face fc-front"><div class="fc-pt">${c.pt}</div><div class="fc-hint">${c.scene}</div></div>
          <div class="fc-face fc-back"><div class="fc-en">${c.en}</div><div class="fc-ctx">${c.pt}</div></div>
        </div>
      </div>
      <div class="fc-progress">${fcIdx+1} / ${cards.length}</div>
      <div class="fc-controls">
        <button class="fc-btn prev" onclick="fcNav(-1)">← Prev</button>
        <button class="fc-btn next" onclick="fcNav(1)">Next →</button>
      </div>
    </div>`;
}

function fcFlip(){fcFlipped=!fcFlipped;const c=document.getElementById('fcCard');if(c)c.classList.toggle('flipped',fcFlipped);}
function fcNav(dir){const cards=getSceneCards(fcScene);fcIdx=(fcIdx+dir+cards.length)%cards.length;fcFlipped=false;renderFlash();}
function fcChangeScene(val){fcScene=parseInt(val);fcIdx=0;fcFlipped=false;renderFlash();}

function renderVerbs(){
  document.getElementById('controls').style.display='none';
  const cards=verbs.map(v=>{
    const tenseNames=Object.keys(v.tenses);
    const active=verbTenseState[v.name]||tenseNames[0];
    const rows=v.tenses[active].map(r=>r[0]?`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`:'').join('');
    const ctabs=tenseNames.map(t=>`<button class="ctab ${t===active?'active':''}" onclick="setTense('${v.name}','${t}')">${t}</button>`).join('');
    return `<div class="verb-card"><div class="verb-name">${v.name}</div><div class="verb-meaning">${v.meaning}</div><div class="conj-tabs">${ctabs}</div><table class="conj-table">${rows}</table></div>`;
  }).join('');
  document.getElementById('main').innerHTML=`<p style="font-size:.78rem;color:#888;margin-bottom:16px">Irregular forms in <span style="color:#c2185b;font-weight:700">pink</span>. Tap tense tabs to switch.</p><div class="verbs-grid">${cards}</div>`;
}
function setTense(name,tense){verbTenseState[name]=tense;renderVerbs();}

function goScene(i){curScene=i;curView='dialogue';quizMode=false;document.getElementById('quizBtn').classList.remove('active');renderTabs();renderDialogue();}
function goFlash(){curView='flash';fcFlipped=false;renderTabs();renderFlash();}
function goVerbs(){curView='verbs';renderTabs();renderVerbs();}
function toggleEng(){showEng=document.getElementById('engToggle').checked;document.querySelectorAll('.en').forEach(el=>el.classList.toggle('hidden',!showEng));}
function toggleTags(){showTags=document.getElementById('tagToggle').checked;const m=document.getElementById('main');m.classList.toggle('tags-hidden',!showTags);const lg=document.getElementById('legend');if(lg)lg.classList.toggle('hidden',!showTags);}
function toggleQuiz(){quizMode=!quizMode;document.getElementById('quizBtn').classList.toggle('active',quizMode);renderDialogue();}

renderTabs();renderDialogue();
</script>
</body>
</html>
